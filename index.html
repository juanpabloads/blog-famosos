<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comunidade Oficial de Novidades</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
    background: linear-gradient(160deg, #1a0028 0%, #2d0042 40%, #1a0018 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Luzes de fundo */
  .bg-light {
    pointer-events: none;
    position: fixed;
    border-radius: 50%;
    filter: blur(110px);
    z-index: 0;
  }
  .bg-left  { width: 380px; height: 380px; left: -100px; top: 20%; background: rgba(190,0,120,0.18); }
  .bg-right { width: 380px; height: 380px; right: -100px; bottom: 20%; background: rgba(120,0,200,0.18); }
  .bg-top   { width: 260px; height: 260px; left: 50%; top: -60px; transform: translateX(-50%); background: rgba(255,0,100,0.1); }

  /* Emojis flutuantes */
  .emoji-float {
    pointer-events: none;
    position: fixed;
    font-size: 1.4rem;
    opacity: 0.18;
    user-select: none;
    z-index: 0;
    animation: drift linear infinite;
  }

  @keyframes drift {
    0%   { transform: translateX(-60px) translateY(0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.18; }
    95%  { opacity: 0.18; }
    100% { transform: translateX(110vw) translateY(-40px) rotate(20deg); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 390px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(60, 0, 80, 0.55) 0%, rgba(30, 0, 50, 0.75) 100%);
    border: 1px solid rgba(255, 100, 200, 0.15);
    border-top: 1px solid rgba(255, 150, 220, 0.25);
    border-left: 1px solid rgba(255, 150, 220, 0.2);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    padding: 2rem 1.75rem;
    text-align: center;
    box-shadow:
      0 40px 70px rgba(0,0,0,0.6),
      0 0 0 0.5px rgba(255,100,200,0.08),
      inset 0 1px 0 rgba(255,180,230,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.2);
  }

  .badge-online {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border-radius: 999px;
    border: 1px solid rgba(16,185,129,0.3);
    background: rgba(16,185,129,0.12);
    padding: 6px 16px;
    margin-bottom: 1.4rem;
    box-shadow: 0 0 12px rgba(16,185,129,0.15);
  }
  .badge-online span.label {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #34d399;
    text-shadow: 0 0 10px rgba(52,211,153,0.5);
  }
  .ping-wrap { position: relative; width: 10px; height: 10px; }
  .ping-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: #34d399;
    opacity: 0.7;
    animation: ping 1.2s ease-in-out infinite;
  }
  .ping-dot {
    position: absolute; inset: 2px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 6px rgba(16,185,129,0.8);
  }
  @keyframes ping {
    0%        { transform: scale(1);   opacity: 0.8; }
    60%       { transform: scale(2.2); opacity: 0; }
    100%      { transform: scale(1);   opacity: 0; }
  }

  /* Ícone principal */
  .icon-main {
    margin: 0 auto 1.1rem;
    width: 64px; height: 64px;
    border-radius: 18px;
    background: rgba(220,0,120,0.12);
    border: 1px solid rgba(220,0,120,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 30px rgba(220,0,120,0.15);
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.7rem;
    font-weight: 800;
    font-style: italic;
    color: #f1f5f9;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  h1 span { color: #e879f9; text-shadow: 0 0 20px rgba(232,121,249,0.4); }

  .subtitle {
    margin-top: 0.6rem;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.9rem;
    font-style: italic;
    color: #e0a0c8;
    line-height: 1.65;
    padding: 0 0.4rem;
  }

  /* Selos */
  .seals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 1.3rem;
  }
  .seal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    border-radius: 14px;
    border: 1px solid rgba(51,65,85,0.6);
    background: rgba(2,6,23,0.55);
    padding: 10px 6px;
  }
  .seal .seal-icon { font-size: 1rem; }
  .seal .seal-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #64748b;
    line-height: 1.3;
    text-align: center;
  }

  /* Info cripto */
  .info-crypto {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 14px;
    border: 1px solid rgba(51,65,85,0.45);
    background: rgba(2,6,23,0.6);
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    color: #60a5fa;
  }

  /* Botão */
  .btn-access {
    margin-top: 1.5rem;
    width: 100%;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, #e4007c, #9000d4);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 16px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(220,0,120,0.4);
    animation: pulse-btn 2.2s ease-in-out infinite;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-access:active  { transform: scale(0.97); }
  .btn-access:disabled { opacity: 0.7; cursor: not-allowed; animation: none; }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 4px 24px rgba(220,0,120,0.4); }
    50%       { box-shadow: 0 4px 40px rgba(220,0,120,0.7); }
  }

  .btn-sub {
    margin-top: 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: #475569;
  }

  /* Footer */
  .footer {
    margin-top: 1.4rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(51,65,85,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #334155;
  }
</style>
</head>
<body>

<div class="bg-light bg-left"></div>
<div class="bg-light bg-right"></div>
<div class="bg-light bg-top"></div>
<div id="emojis"></div>

<div class="card">

  <!-- Badge Online -->
  <div class="badge-online">
    <div class="ping-wrap">
      <div class="ping-ring"></div>
      <div class="ping-dot"></div>
    </div>
    <span class="label">Karol Rosalin está online agora</span>
  </div>

  <!-- Ícone -->
  <div class="icon-main">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.708l-1.703 8.03c-.123.557-.453.693-.918.431l-2.54-1.873-1.226 1.18c-.136.136-.25.25-.512.25l.182-2.587 4.7-4.246c.205-.182-.044-.283-.317-.101L7.61 14.42l-2.5-.782c-.543-.17-.554-.543.114-.803l9.752-3.759c.452-.164.849.101.954.632z" fill="#e4007c"/>
    </svg>
  </div>

  <!-- Título -->
  <h1>Canal Exclusivo de<br><span>Novidades & Bastidores</span></h1>

  <!-- Subtítulo -->
  <p class="subtitle">
    Fique por dentro de tudo. Novidades, bastidores e conteúdo exclusivo todo dia.
  </p>

  <!-- Selos -->
  <div class="seals">
    <div class="seal">
      <span class="seal-icon">✅</span>
      <span class="seal-label">Canal<br>Verificado</span>
    </div>
    <div class="seal">
      <span class="seal-icon">🔐</span>
      <span class="seal-label">Acesso<br>Seguro</span>
    </div>
    <div class="seal">
      <span class="seal-icon">⚡</span>
      <span class="seal-label">Acesso<br>Imediato</span>
    </div>
  </div>



  <!-- Botão -->
  <button class="btn-access" id="btn" onclick="handleAccess()">
    Acessar Conteúdo Agora →
  </button>

  <p class="btn-sub">Acesso gratuito · Sem cadastro</p>

  <!-- Footer -->
  <div class="footer">
    <span>🌐 Conteúdo Oficial</span>
    <span>•</span>
    <span>Sistema Seguro</span>
    <span>•</span>
    <span>100% Gratuito</span>
  </div>

</div>

<script>
  var BASE_URL = "https://t.me/Karol_Rosalinn_Bot?start=0b005a92";
  var params   = new URLSearchParams(window.location.search);
  var shk      = params.get("shk");
  var targetUrl = shk ? BASE_URL + "&shk=" + encodeURIComponent(shk) : BASE_URL;

  function handleAccess() {
    var btn = document.getElementById("btn");
    btn.textContent = "✓  Redirecionando…";
    btn.disabled = true;
    setTimeout(function () { window.location.href = targetUrl; }, 400);
  }

  // Emojis flutuantes
  var EMOJIS = ["💋","👄","🌹","💅","👑","💫"];
  var wrap = document.getElementById("emojis");
  for (var i = 0; i < 12; i++) {
    var s = document.createElement("span");
    s.className = "emoji-float";
    s.textContent = EMOJIS[i % EMOJIS.length];
    s.style.top  = ((i * 37) % 90) + "%";
    s.style.left = "-60px";
    var dur   = 8 + (i * 1.3) % 10;
    var delay = (i * 1.1) % 12;
    s.style.animationDuration = dur + "s";
    s.style.animationDelay   = "-" + delay + "s";
    wrap.appendChild(s);
  }
</script>
</body>
</html>
