  .bg-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.42);
    backdrop-filter: blur(2px);
    z-index: 1;
  }
 
  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem 1.2rem;
  }
 
  /* TOPO */
  .top-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #fff;
  }
  .ping-wrap { position: relative; width: 8px; height: 8px; flex-shrink: 0; }
  .ping-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: #34d399;
    animation: ping 1.2s ease-in-out infinite;
  }
  .ping-dot {
    position: absolute; inset: 1.5px;
    border-radius: 50%;
    background: #10b981;
  }
  @keyframes ping {
    0%  { transform: scale(1);   opacity: 0.85; }
    70% { transform: scale(2.3); opacity: 0; }
    100%{ transform: scale(1);   opacity: 0; }
  }
  .sep { color: rgba(255,255,255,0.3); }
 
  /* MEIO */
  .middle {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 360px;
  }
 
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 400;
    font-style: italic;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    letter-spacing: 0.02em;
    line-height: 1.1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 0;
  }

<script>
  var BASE_URL  = "https://t.me/Karol_Rosalinn_Bot?start=0b005a92";
  var params    = new URLSearchParams(window.location.search);
  var shk       = params.get("shk");
  var targetUrl = shk ? BASE_URL + "&shk=" + encodeURIComponent(shk) : BASE_URL;
 
  function handleAccess() {
    var btn = document.getElementById("btn");
    btn.textContent = "✓  Redirecionando…";
    btn.classList.add("clicked");
    setTimeout(function () { window.location.href = targetUrl; }, 400);
  }
 
  // Timer regressivo
  var total = 120;
  function updateTimer() {
    if (total <= 0) { total = 0; }
    var h = Math.floor(total / 3600);
    var m = Math.floor((total % 3600) / 60);
    var s = total % 60;
    document.getElementById("hrs").textContent  = String(h).padStart(2,"0");
    document.getElementById("mins").textContent = String(m).padStart(2,"0");
    document.getElementById("secs").textContent = String(s).padStart(2,"0");
    if (total > 0) { total--; setTimeout(updateTimer, 1000); }
  }
  updateTimer();
</script>
